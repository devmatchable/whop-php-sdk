name: Bug report
description: Report a bug or unexpected behaviour in the SDK.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much of the template as you can — incomplete reports take longer to triage.

        **Security-sensitive bugs**: do not use this template. See [SECURITY.md](https://github.com/devmatchable/whop-php-sdk/blob/master/SECURITY.md).
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: e.g. `0.0.1`, or the commit SHA if installed from VCS.
      placeholder: 0.0.1
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.x"
    validations:
      required: true
  - type: input
    id: http-client
    attributes:
      label: PSR-18 HTTP client
      description: Which package + version are you using? e.g. `symfony/http-client 7.4.0`, `guzzlehttp/guzzle 7.9.0`.
      placeholder: "symfony/http-client 7.4.0"
    validations:
      required: true
  - type: input
    id: psr7-impl
    attributes:
      label: PSR-7 / PSR-17 implementation
      description: e.g. `nyholm/psr7 1.8.0`. Skip if unsure.
      placeholder: "nyholm/psr7 1.8.x"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands — the smaller the reproduction, the faster the fix.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack traces
      description: Use code blocks for readability.
      render: shell
    validations:
      required: false
