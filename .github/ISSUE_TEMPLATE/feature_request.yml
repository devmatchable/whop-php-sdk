name: Feature request
description: Suggest a new feature or improvement to the SDK.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature. Please describe the use case before the proposed solution — that's the part that determines whether the feature fits.

        Note: the SDK is framework-agnostic and built on PSR interfaces. Features that introduce framework-specific code should usually be proposed in [whop-symfony-bundle](https://github.com/devmatchable/whop-symfony-bundle) (or an equivalent framework adapter) instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish? Why does the SDK's current shape make it hard?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API or behaviour would you expect? A short code sketch is welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem, and why they fall short.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, the relevant Whop API endpoints, or prior art from other SDKs.
    validations:
      required: false
